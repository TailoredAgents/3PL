services:
  - type: web
    name: atlanta-freight-os
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run prisma:deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: atlanta-freight-os-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: INTERNAL_APP_PASSWORD
        sync: false
      - key: INTERNAL_AUTH_COOKIE
        value: atlanta_freight_internal
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.3
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DAT_CLIENT_ID
        sync: false
      - key: DAT_CLIENT_SECRET
        sync: false
      - key: TRUCKSTOP_CLIENT_ID
        sync: false
      - key: TRUCKSTOP_CLIENT_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: atlanta-freight-os-db
    plan: free
    region: oregon
    databaseName: atlanta_freight_os
    user: atlanta_freight_os_user
